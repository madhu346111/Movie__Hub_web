<!DOCTYPE html>
<html>
<head>
<title>Movie Hub Pro</title>

<link href="style.css" rel="stylesheet"/>

</head>

<body>

<header>
<h2>🎬 Movie Hub Pro</h2>
<nav>
<button onclick="showAll()">All</button>
<button onclick="filterGenre('Action')">Hollywood</button>
<button onclick="filterGenre('Drama')">Bollywood</button>
<button onclick="filterGenre('Animation')">Cartoon</button>
<button onclick="showWatchlist()">❤️ Watchlist</button>
</nav>
</header>

<div class="search">
<input id="search" placeholder="Search movies...">
</div>

<div class="grid" id="movies"></div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
<div class="modal-content" onclick="event.stopPropagation()">
<h2 id="title"></h2>
<iframe id="trailer"></iframe>
<p id="desc"></p>
<div id="ratingBox"></div>
<button onclick="closeModal()">Close</button>
</div>
</div>

<!-- FOOTER -->
<footer>
<div class="footer-container">
<div class="footer-section">
<h4>Quick Links</h4>
<a onclick="showAll()">Home</a>
<a onclick="filterGenre('Action')">Hollywood</a>
<a onclick="filterGenre('Drama')">Bollywood</a>
</div>

<div class="footer-section">
<h4>Follow</h4>
<a>👍 Facebook</a>
<a>📸 Instagram</a>
</div>

<div class="footer-section">
<h4>Newsletter</h4>
<input placeholder="Email" style="padding:5px;border-radius:5px;border:none">
<button>Subscribe</button>
</div>
</div>

<p class="copy">© 2026 Movie Hub</p>
</footer>

<script src="script.js"></script>

</body>
</html>
